<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freezer mundialista — Mundial 2026</title>
<meta property="og:title" content="❄ Freezer mundialista — Mundial 2026">
<meta property="og:description" content="Sumate al freezer colectivo del Mundial 2026 — votá y congelá con nosotros.">
<meta property="og:image" content="https://freezermundialista.netlify.app/images/default.jpg">
<meta property="og:image:width" content="1254">
<meta property="og:image:height" content="1254">
<meta property="og:url" content="https://freezermundialista.netlify.app/">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root{
    --ice:#bfe9ff; --candle:#e8c468; --void:#0a0a0c; --bone:#e9e2d0;
    --panel:#0e1620; --border:rgba(191,233,255,0.25); --err:#e06a5c;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--void);color:var(--bone);
       font-family:'Courier New',monospace;}
  header{padding:18px 16px 10px;text-align:center;}
  header h1{margin:0;font-size:20px;letter-spacing:2px;color:var(--ice);
             text-shadow:0 0 10px rgba(191,233,255,.4);}
  header p{margin:4px 0 0;font-size:12px;color:#8a8a8a;}

  #tabs{display:flex;border-bottom:1px solid var(--border);margin:0 12px;}
  .tab{flex:1;padding:12px;text-align:center;background:none;border:none;
       color:#8a8a8a;font-family:inherit;font-size:14px;letter-spacing:1px;
       cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--ice);border-bottom-color:var(--ice);}

  #panel-vote, #panel-game{padding:16px;max-width:480px;margin:0 auto;}
  #panel-game{padding:0;max-width:none;}
  #panel-game iframe{width:100%;height:calc(100vh - 84px);border:none;display:block;}
  .hidden{display:none;}

  .flag{width:22px;height:16px;object-fit:cover;border-radius:2px;
        box-shadow:0 0 0 1px rgba(255,255,255,0.15);vertical-align:middle;}

  .match-card{background:var(--panel);border:1px solid var(--border);
              border-radius:8px;padding:16px;text-align:center;}
  .match-card .stage{font-size:11px;color:var(--candle);letter-spacing:1px;text-transform:uppercase;}
  .match-card .venue{font-size:11px;color:#8a8a8a;margin-top:2px;}
  .match-card .teams{font-size:17px;margin:14px 0 4px;color:var(--bone);
                      display:flex;align-items:center;justify-content:center;gap:8px;}
  .match-card .kickoff{font-size:12px;color:#8a8a8a;}

  .vote-row{display:flex;gap:10px;margin-top:18px;}
  .vote-btn{flex:1;background:var(--panel);border:1.5px solid var(--border);
            color:var(--bone);border-radius:8px;padding:14px 8px;cursor:pointer;
            font-family:inherit;font-size:13px;transition:border-color .2s,transform .1s;
            display:flex;flex-direction:column;align-items:center;gap:6px;}
  .vote-btn:hover:not(:disabled){border-color:var(--ice);transform:translateY(-2px);}
  .vote-btn:disabled{opacity:.5;cursor:not-allowed;}
  .vote-btn .count{display:block;font-size:22px;color:var(--ice);}
  .vote-btn.mine{border-color:var(--candle);}

  #status-msg{text-align:center;font-size:12px;color:#8a8a8a;margin-top:14px;}

  #play-link{display:block;text-align:center;margin-top:20px;padding:12px;
             border:1.5px solid var(--candle);border-radius:8px;color:var(--candle);
             text-decoration:none;font-size:13px;letter-spacing:1px;}

  #next-matches{margin-top:28px;}
  #next-matches h2{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
                    color:#8a8a8a;margin:0 0 10px;}
  .fixture-row{display:flex;align-items:center;gap:8px;padding:8px 0;
               border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px;}
  .fixture-row .fx-teams{flex:1;display:flex;align-items:center;gap:6px;}
  .fixture-row .fx-time{color:#8a8a8a;font-size:11px;white-space:nowrap;}
  .fixture-row .fx-note{color:#8a8a8a;font-size:10px;}
  .pill{font-size:9px;padding:2px 6px;border-radius:10px;letter-spacing:.5px;text-transform:uppercase;}
  .pill.live{background:rgba(224,106,92,0.2);color:var(--err);}
  .pill.upcoming{background:rgba(191,233,255,0.12);color:var(--ice);}
  .pill.finished{background:rgba(255,255,255,0.06);color:#666;}

  #snackbar{position:fixed;left:50%;bottom:20px;transform:translate(-50%,20px);
            background:var(--panel);border:1px solid var(--err);color:var(--bone);
            padding:10px 16px;border-radius:8px;font-size:12px;opacity:0;
            transition:opacity .25s,transform .25s;pointer-events:none;z-index:99;
            max-width:90%;text-align:center;}
  #snackbar.show{opacity:1;transform:translate(-50%,0);}

  #share-general-btn{
    margin-top:10px;background:var(--panel);border:1px solid var(--border);
    color:var(--ice);font-family:inherit;font-size:12px;padding:6px 14px;
    border-radius:20px;cursor:pointer;
  }
  #share-general-btn:hover{border-color:var(--ice);}

  #share-fallback{
    position:fixed;z-index:98;top:70px;left:50%;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--border);border-radius:8px;
    padding:8px;display:none;gap:6px;flex-direction:column;min-width:160px;
  }
  #share-fallback.show{display:flex;}
  #share-fallback a, #share-fallback button{
    background:none;border:none;color:var(--bone);font-family:inherit;
    font-size:13px;text-align:left;padding:8px 10px;border-radius:6px;
    cursor:pointer;text-decoration:none;
  }
  #share-fallback a:hover, #share-fallback button:hover{background:rgba(255,255,255,0.06);}

  #vote-share-overlay{
    position:fixed;inset:0;background:rgba(5,5,7,0.7);z-index:97;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  #vote-share-overlay.hidden{display:none;}
  .vs-card{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:20px;max-width:340px;text-align:center;
  }
  .vs-card p{font-size:14px;line-height:1.5;margin:0 0 16px;}
  .vs-actions{display:flex;gap:10px;justify-content:center;}
  .vs-actions button{
    font-family:inherit;font-size:13px;padding:10px 16px;border-radius:6px;cursor:pointer;
  }
  #vs-share-btn{background:var(--candle);border:none;color:#1a1200;}
  .vs-secondary{background:none;border:1px solid var(--border);color:var(--bone);}

  #blizzard-overlay{
    position:fixed;inset:0;z-index:100;pointer-events:none;overflow:hidden;
    opacity:0;transition:opacity .35s ease;
  }
  #blizzard-overlay.show{opacity:1;}
  #blizzard-overlay::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 50% 40%, rgba(191,233,255,0.4), rgba(10,10,12,0) 70%);
  }
  .snowflake{
    position:absolute;top:-24px;color:var(--ice);
    text-shadow:0 0 6px rgba(191,233,255,.8);
    animation:snowfall linear forwards;
  }
  @keyframes snowfall{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0;}
    12%{opacity:1;}
    100%{transform:translateY(115vh) translateX(var(--drift,20px)) rotate(180deg);opacity:.15;}
  }
</style>
</head>
<body>

<header>
  <h1>❄ Freezer mundialista</h1>
  <p>Votá con miles de personas para congelar al mismo rival, al mismo tiempo. Elegí a quién congelamos juntos.</p>
  <button id="share-general-btn">📤 Compartir</button>
</header>

<div id="share-fallback"></div>

<div id="tabs">
  <button class="tab active" data-tab="vote">VOTAR</button>
  <button class="tab" data-tab="game">JUGAR</button>
</div>

<div id="panel-vote">
  <div class="match-card" id="match-card">Cargando partido...</div>
  <div class="vote-row" id="vote-row"></div>
  <div id="status-msg"></div>
  <a href="#" id="play-link" class="hidden" data-tab-link="game">🎮 Ir al freezer del partido</a>

  <div id="next-matches">
    <h2>Próximos partidos</h2>
    <div id="fixture-list"></div>
  </div>
</div>

<div id="panel-game" class="hidden">
  <iframe id="game-frame" src=""></iframe>
</div>

<div id="vote-share-overlay" class="hidden">
  <div class="vs-card">
    <p id="vs-text"></p>
    <div class="vs-actions">
      <button id="vs-share-btn">📤 Compartir</button>
      <button id="vs-close-btn" class="vs-secondary">Listo</button>
    </div>
  </div>
</div>

<div id="blizzard-overlay"></div>

<div id="snackbar"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="fixtures.js"></script>
<script src="vote.js"></script>
<script>
  // ---------- SNACKBAR ----------
  let snackTimer = null;
  function showSnackbar(msg) {
    const el = document.getElementById('snackbar');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(snackTimer);
    snackTimer = setTimeout(() => el.classList.remove('show'), 3200);
  }

  // ---------- SHARING ----------
  const SITE_URL = location.origin + location.pathname;
  const GENERAL_SHARE_TEXT = '❄ Sumate al freezer colectivo del Mundial 2026 — votá y congelá con nosotros:';

  function shareViaBestMethod(text, url = SITE_URL) {
    if (navigator.share) {
      navigator.share({ text, url }).catch(() => {}); // ignore user-cancelled
    } else {
      openShareFallback(text, url);
    }
  }

  function openShareFallback(text, url = SITE_URL) {
    const encoded = encodeURIComponent(`${text} ${url}`);
    const panel = document.getElementById('share-fallback');
    panel.innerHTML = `
      <a href="https://twitter.com/intent/tweet?text=${encoded}" target="_blank" rel="noopener">𝕏 Postear en X</a>
      <a href="https://wa.me/?text=${encoded}" target="_blank" rel="noopener">💬 WhatsApp</a>
      <button type="button" data-copy-text="${text.replace(/"/g, '&quot;')}" data-copy-url="${url}">🔗 Copiar link</button>
    `;
    panel.querySelector('[data-copy-text]').addEventListener('click', function () {
      navigator.clipboard.writeText(`${this.dataset.copyText} ${this.dataset.copyUrl}`)
        .then(() => showSnackbar('Link copiado.'));
      closeShareFallback();
    });
    panel.classList.add('show');
  }

  function closeShareFallback() {
    document.getElementById('share-fallback').classList.remove('show');
  }
  document.addEventListener('click', e => {
    const panel = document.getElementById('share-fallback');
    if (panel.classList.contains('show') && !panel.contains(e.target) && e.target.id !== 'share-general-btn') {
      closeShareFallback();
    }
  });

  document.getElementById('share-general-btn').addEventListener('click', () => shareViaBestMethod(GENERAL_SHARE_TEXT));

  // ---------- BLIZZARD (vote confirmation flourish) ----------
  function triggerBlizzard() {
    const overlay = document.getElementById('blizzard-overlay');
    overlay.innerHTML = '';
    for (let i = 0; i < 36; i++) {
      const flake = document.createElement('span');
      flake.className = 'snowflake';
      flake.textContent = '❄';
      flake.style.left = Math.random() * 100 + '%';
      flake.style.fontSize = (10 + Math.random() * 14) + 'px';
      flake.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
      flake.style.animationDuration = (1.1 + Math.random() * 0.8) + 's';
      flake.style.animationDelay = (Math.random() * 0.3) + 's';
      overlay.appendChild(flake);
    }
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 1700);
    setTimeout(() => { overlay.innerHTML = ''; }, 2100); // cleanup once fully faded
  }

  // Post-vote prompt — shown once, right when THIS user's own vote registers
  // (not on every realtime update from other voters). Links to that team's
  // dedicated /share/{code}.html page so the social preview shows the
  // matching pre-rendered image, not the generic site preview.
  const VOTE_SHARE_TEMPLATES = [
    team => `❄ Voté para congelar a ${team} en el Mundial 2026. ¿Te sumás?`,
    team => `Ayudame a congelar a ${team} para que pierdan. Ya voté ❄`,
    team => `Metí el papelito de ${team} en el freezer. Sumate vos también ❄`,
    team => `${team} ya está en mi freezer. ¿Vos a quién vas a congelar?`,
    team => `Acabo de votar para congelar a ${team}. No lo va a explicar la ciencia, pero funciona ❄`
  ];

  let currentVoteShareUrl = SITE_URL;

  function showVoteShareOverlay(teamLabel, teamCode) {
    const template = VOTE_SHARE_TEMPLATES[Math.floor(Math.random() * VOTE_SHARE_TEMPLATES.length)];
    currentVoteShareUrl = teamCode
      ? `${location.origin}/share/${teamCode.toLowerCase()}.html`
      : SITE_URL;
    document.getElementById('vs-text').textContent = template(teamLabel);
    document.getElementById('vote-share-overlay').classList.remove('hidden');
  }
  document.getElementById('vs-close-btn').addEventListener('click', () =>
    document.getElementById('vote-share-overlay').classList.add('hidden'));
  document.getElementById('vs-share-btn').addEventListener('click', () => {
    shareViaBestMethod(document.getElementById('vs-text').textContent, currentVoteShareUrl);
    document.getElementById('vote-share-overlay').classList.add('hidden');
  });

  // ---------- FLAG / NAME HELPERS ----------
  function flagImg(team) {
    return team.flag ? `<img class="flag" src="https://flagcdn.com/24x18/${team.flag}.png" alt="">` : '';
  }
  function describeTeam(team) {
    if (team.name_es) return { label: team.name_es, flagHtml: flagImg(team), code: team.code, flag: team.flag || '', color: team.color || '' };
    if (team.ref) {
      const [kind, matchId] = team.ref.split(':');
      const verb = kind === 'winner' ? 'Ganador' : 'Perdedor';
      const refMatch = FIXTURES.matches.find(m => m.id === matchId);
      if (refMatch && refMatch.home.name_es && refMatch.away.name_es) {
        return { label: `${verb}: ${refMatch.home.name_es}/${refMatch.away.name_es}`, flagHtml: '', code: null };
      }
      return { label: `${verb} ${matchId.toUpperCase()}`, flagHtml: '', code: null };
    }
    return { label: '?', flagHtml: '', code: null };
  }

  // ---------- TAB SWITCHING ----------
  const tabs = document.querySelectorAll('.tab');
  const panels = { vote: document.getElementById('panel-vote'), game: document.getElementById('panel-game') };

  function showTab(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    Object.entries(panels).forEach(([key, el]) => el.classList.toggle('hidden', key !== name));
    if (name === 'game') loadGameFrame();
  }
  tabs.forEach(t => t.addEventListener('click', () => showTab(t.dataset.tab)));
  document.querySelectorAll('[data-tab-link]').forEach(el =>
    el.addEventListener('click', e => { e.preventDefault(); showTab(el.dataset.tabLink); })
  );

  // ---------- VOTE PANEL ----------
  const { match, status, votingOpen } = getActiveMatch();
  const cardEl = document.getElementById('match-card');
  const rowEl = document.getElementById('vote-row');
  const statusEl = document.getElementById('status-msg');
  const playLink = document.getElementById('play-link');

  const STAGE_ES = {
    quarterfinal: 'Cuartos de final', semifinal: 'Semifinal',
    third_place: 'Tercer puesto', final: 'Final'
  };

  if (!match) {
    cardEl.textContent = 'El torneo terminó. Nos vemos en 2030.';
  } else {
    const home = describeTeam(match.home), away = describeTeam(match.away);
    const kickoffLocal = new Date(match.kickoff_utc).toLocaleString('es-AR', {
      dateStyle: 'medium', timeStyle: 'short'
    });
    cardEl.innerHTML = `
      <div class="stage">${STAGE_ES[match.stage] || match.stage}</div>
      <div class="venue">${match.venue}</div>
      <div class="teams">${home.flagHtml}${home.label} vs ${away.label}${away.flagHtml}</div>
      <div class="kickoff">${status === 'live' ? 'EN VIVO' : kickoffLocal}</div>
    `;
    if (home.code && away.code) {
      renderVoteButtons(home, away);
      playLink.classList.remove('hidden');
      refreshCounts();
      subscribeToVotes(match.id, refreshCounts);
    } else {
      statusEl.textContent = 'Los equipos de este partido todavía no están definidos.';
    }
  }

  function renderVoteButtons(home, away) {
    const myVote = getMyVote(match.id);
    rowEl.innerHTML = '';
    [home, away].forEach(team => {
      const btn = document.createElement('button');
      btn.className = 'vote-btn' + (myVote === team.code ? ' mine' : '');
      btn.disabled = !votingOpen || !!myVote;
      btn.innerHTML = `${team.flagHtml}❄ Congelar a ${team.label}<span class="count" id="count-${team.code}">–</span>`;
      btn.addEventListener('click', () => onVote(team.code));
      rowEl.appendChild(btn);
    });
  }

  async function onVote(teamCode) {
    try {
      const { error, alreadyVoted } = await castVote(match.id, teamCode);
      if (alreadyVoted) { showSnackbar('Ya votaste en este partido.'); return; }
      if (error) { showSnackbar('No se pudo registrar el voto. Probá de nuevo.'); return; }
      statusEl.textContent = '¡Voto registrado! El freezer está activo.';
      const home = describeTeam(match.home), away = describeTeam(match.away);
      renderVoteButtons(home, away);
      refreshCounts();
      triggerBlizzard();
      const votedTeam = teamCode === home.code ? home : away;
      setTimeout(() => showVoteShareOverlay(votedTeam.label, votedTeam.code), 1500);
    } catch (e) {
      console.error(e);
      showSnackbar('No se pudo registrar el voto. Probá de nuevo.');
    }
  }

  async function refreshCounts() {
    try {
      const counts = await getVoteCounts(match.id);
      [match.home, match.away].forEach(team => {
        if (!team.code) return;
        const el = document.getElementById(`count-${team.code}`);
        if (el) el.textContent = counts[team.code] || 0;
      });
    } catch (e) {
      console.error(e);
      showSnackbar('No se pudieron actualizar los votos.');
    }
  }

  // ---------- NEXT MATCHES LIST ----------
  (function renderFixtureList() {
    const listEl = document.getElementById('fixture-list');
    listEl.innerHTML = FIXTURES.matches.map(m => {
      const home = describeTeam(m.home), away = describeTeam(m.away);
      const st = getMatchStatus(m);
      const time = new Date(m.kickoff_utc).toLocaleString('es-AR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
      const pillLabel = st === 'live' ? 'En vivo' : st === 'upcoming' ? 'Próximo' : 'Finalizado';
      const middle = m.result
        ? `${home.flagHtml} ${home.label} <strong>${m.result.home}-${m.result.away}</strong> ${away.label} ${away.flagHtml}${m.result.note ? ` <span class="fx-note">(${m.result.note})</span>` : ''}`
        : `${home.flagHtml} ${home.label} vs ${away.label} ${away.flagHtml}`;
      return `
        <div class="fixture-row">
          <span class="pill ${st}">${pillLabel}</span>
          <span class="fx-teams">${middle}</span>
          <span class="fx-time">${time}</span>
        </div>`;
    }).join('');
  })();

  // ---------- GAME PANEL ----------
  // Which side you play is decided entirely inside brujitas.html's own
  // team-picker screen — the live vote only comes along as a small difficulty
  // signal (handled there too), never as a forced assignment.
  let gameLoaded = false;
  function loadGameFrame() {
    if (gameLoaded || !match) return;
    const home = describeTeam(match.home), away = describeTeam(match.away);
    if (!home.code || !away.code) return; // teams not resolved yet, nothing to load

    getVoteCounts(match.id).then(counts => {
      const params = new URLSearchParams({
        team1_name: home.label, team1_code: home.code, team1_flag: home.flag, team1_color: home.color,
        team2_name: away.label, team2_code: away.code, team2_flag: away.flag, team2_color: away.color,
        votes1: counts[home.code] || 0, votes2: counts[away.code] || 0
      });
      document.getElementById('game-frame').src = `brujitas.html?${params}`;
      gameLoaded = true;
    }).catch(e => {
      console.error(e);
      showSnackbar('No se pudo cargar el partido.');
    });
  }
</script>
</body>
</html>
